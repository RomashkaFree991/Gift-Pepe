<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        img {
            pointer-events: none;
        }

        /* ─── Loading Screen ─── */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #1a1a2e;
            background-image: url('background_pepe.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #5eaaff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #1a1a2e;
            background-image: url('background_pepe.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        /* ─── Top Bar ─── */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            padding-top: calc(85px + env(safe-area-inset-top, 0px));
            z-index: 100;
        }

        .pill {
            display: flex;
            align-items: center;
            height: 40px;
            background: rgba(35, 35, 40, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 4px;
            gap: 0;
        }

        /* ─ Left pill: avatar + name ─ */
        .pill-user .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .pill-user .username {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.92);
            padding: 0 12px 0 8px;
            white-space: nowrap;
        }

        /* ─ Right pill: star + balance + plus ─ */
        .pill-stars {
            gap: 0;
            padding-right: 4px;
        }

        .pill-stars .star-icon {
            width: 22px;
            height: 22px;
            margin-left: 6px;
            flex-shrink: 0;
        }

        .pill-stars .star-balance {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.92);
            padding: 0 8px 0 6px;
        }

        .pill-stars .plus-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f5a623;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .pill-stars .plus-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ─── Bottom Nav ─── */
        .bottom-nav {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 66px;
            background: rgba(35, 35, 40, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .nav-items {
            display: flex;
            align-items: center;
            position: relative;
            width: 100%;
            justify-content: space-evenly;
        }

        /* Скользящий индикатор */
        .nav-indicator {
            position: absolute;
            width: 58px;
            height: 50px;
            background: rgba(100, 170, 255, 0.22);
            border-radius: 16px;
            top: 50%;
            transform: translateY(-50%);
            transition: left 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            z-index: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 1;
            width: 58px;
            padding: 6px 0;
        }

        .nav-item img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
            opacity: 0.45;
            transition: opacity 0.3s ease;
        }

        .nav-item.active img {
            opacity: 1;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.3s ease;
            letter-spacing: 0.2px;
        }

        .nav-item.active span {
            color: rgba(255, 255, 255, 0.95);
        }

        /* ─── Tab Pages ─── */
        .tab-page {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            pointer-events: none;
        }

        .tab-page.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* ─── Profile Page ─── */
        .profile-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: calc(135px + env(safe-area-inset-top, 0px));
            padding-bottom: 100px;
            padding-left: 16px;
            padding-right: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .profile-card {
            width: 100%;
            background: rgba(35, 35, 40, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 20px;
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.12);
        }

        .profile-avatar-placeholder {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(100, 170, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.12);
        }

        .profile-name {
            margin-top: 10px;
            font-size: 18px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
        }

        .profile-username {
            margin-top: 3px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(100, 170, 255, 0.85);
        }

        /* ─ Avatar wrapper with gear ─ */
        .avatar-wrapper {
            position: relative;
            width: 72px;
            height: 72px;
        }

        .avatar-wrapper .settings-btn {
            position: absolute;
            bottom: -2px;
            left: -2px;
            width: 26px;
            height: 26px;
            background: rgba(50, 50, 58, 0.9);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            z-index: 2;
        }

        .avatar-wrapper .settings-btn svg {
            width: 14px;
            height: 14px;
            pointer-events: auto;
        }

        /* ─ Invite button ─ */
        .invite-btn {
            width: 100%;
            margin-top: 12px;
            background: rgba(35, 35, 40, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s ease;
        }

        .invite-btn:active {
            transform: scale(0.98);
        }

        .invite-btn-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .invite-btn-text .main {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
        }

        .invite-btn-text .sub {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
        }

        .invite-btn .arrow {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        /* ─── Referral Page ─── */
        .referral-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: calc(90px + env(safe-area-inset-top, 0px));
            padding-bottom: 100px;
            padding-left: 16px;
            padding-right: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .ref-back {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 16px;
        }

        .ref-back svg {
            width: 20px;
            height: 20px;
            pointer-events: auto;
        }

        .ref-back span {
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        .ref-stats {
            width: 100%;
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .ref-stat-card {
            flex: 1;
            background: rgba(35, 35, 40, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .ref-stat-card .label {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
        }

        .ref-stat-card .value {
            font-size: 22px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ref-stat-card .value img {
            width: 18px;
            height: 18px;
        }

        /* ─ Referral link card ─ */
        .ref-link-card {
            width: 100%;
            background: rgba(35, 35, 40, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ref-link-card .card-title {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        .ref-link-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ref-link-input {
            flex: 1;
            height: 42px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            font-family: inherit;
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .ref-copy-icon {
            width: 42px;
            height: 42px;
            background: rgba(100, 170, 255, 0.18);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
            transition: background 0.2s ease;
        }

        .ref-copy-icon:active {
            background: rgba(100, 170, 255, 0.35);
        }

        .ref-copy-icon svg {
            width: 18px;
            height: 18px;
            pointer-events: auto;
        }

        .ref-copy-btn {
            width: 100%;
            height: 46px;
            background: rgba(100, 170, 255, 0.22);
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
            transition: background 0.2s ease;
        }

        .ref-copy-btn:active {
            background: rgba(100, 170, 255, 0.35);
        }

        /* ─ Gifts card ─ */
        .gifts-card {
            width: 100%;
            margin-top: 0;
            background: rgba(35, 35, 40, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 20px 32px;
        }

        .gifts-lottie {
            width: 140px;
            height: 140px;
        }

        .gifts-title {
            margin-top: 14px;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.92);
            text-align: center;
        }

        .gifts-desc {
            margin-top: 6px;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            line-height: 1.4;
        }

        .gifts-desc a {
            color: rgba(100, 170, 255, 0.85);
            text-decoration: none;
        }

        /* ─── Games Page ─── */
        .games-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: calc(140px + env(safe-area-inset-top, 0px));
            padding-bottom: 100px;
            padding-left: 16px;
            padding-right: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            height: 100%;
        }

        .game-banner {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s ease;
            line-height: 0;
            font-size: 0;
            display: flex;
        }

        .game-banner:active {
            transform: scale(0.98);
        }

        .game-banner img {
            width: 100%;
            display: block;
            border-radius: 20px;
            vertical-align: top;
            height: auto;
        }

        /* ─── Section Titles ─── */
        .section-title {
            width: 100%;
            font-size: 17px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 8px;
            text-align: left;
        }

        /* ─── Ad Banner ─── */
        .ad-banner {
            width: 100%;
            aspect-ratio: 2048 / 555;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 8px;
            line-height: 0;
            font-size: 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s ease;
            display: block;
            flex-shrink: 0;
        }

        .ad-banner:active {
            transform: scale(0.98);
        }

        .ad-banner img {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 16px;
            vertical-align: top;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <!-- Left pill: avatar + nickname -->
        <div class="pill pill-user">
            <img class="avatar" id="userAvatar" src="" alt="">
            <span class="username" id="userName">User</span>
        </div>

        <!-- Right pill: star + balance + plus -->
        <div class="pill pill-stars">
            <img class="star-icon" src="star.png" alt="Stars">
            <span class="star-balance">0</span>
            <div class="plus-btn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5.5V18.5M5.5 12H18.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Tab Pages -->
    <div class="tab-page active" id="page-top"></div>
    <div class="tab-page" id="page-games">
        <div class="games-page">
            <div class="ad-banner" onclick="openBanner('https://t.me/GiftPepeChannel')">
                <img src="baner_1.png" alt="Banner">
            </div>
            <div class="section-title">Выберите игру</div>
            <div class="game-banner" onclick="openGame('crash')">
                <img src="Crash.png" alt="Crash">
            </div>
        </div>
    </div>
    <div class="tab-page profile-page" id="page-profile">
        <!-- User card -->
        <div class="section-title">Профиль</div>
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img class="profile-avatar" id="profileAvatar" src="" alt="" style="display:none;">
                <div class="profile-avatar-placeholder" id="profileAvatarPlaceholder" style="display:none;"></div>
                <div class="settings-btn" onclick="openSettings()">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 15.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z" stroke="rgba(255,255,255,0.7)" stroke-width="1.8"/>
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-1.42 3.42 2 2 0 01-1.41-.59l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="rgba(255,255,255,0.7)" stroke-width="1.8"/>
                    </svg>
                </div>
            </div>
            <div class="profile-name" id="profileName">User</div>
            <div class="profile-username" id="profileUsername">@username</div>
        </div>

        <!-- Invite button -->
        <div class="invite-btn" onclick="showReferralPage()">
            <div class="invite-btn-text">
                <span class="main">ПРИГЛАСИТЬ ДРУГА</span>
                <span class="sub">Получайте бонусы</span>
            </div>
            <span class="arrow">›</span>
        </div>

        <!-- Gifts card -->
        <div class="section-title" style="margin-top: 20px;">Инвентарь</div>
        <div class="gifts-card">
            <div class="gifts-lottie" id="giftsLottie"></div>
            <div class="gifts-title">Не нашли подарков?</div>
            <div class="gifts-desc">Пополните в <a href="https://t.me/GiftPepeSupport" target="_blank">@GiftPepeSupport</a> или выиграйте в играх.</div>
        </div>
    </div>

    <!-- Referral Page -->
    <div class="tab-page referral-page" id="page-referral">
        <div class="ref-back" onclick="hideReferralPage()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 18l-6-6 6-6" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Назад</span>
        </div>

        <div class="ref-stats">
            <div class="ref-stat-card">
                <span class="label">Рефералы</span>
                <span class="value">0</span>
            </div>
            <div class="ref-stat-card">
                <span class="label">Заработано</span>
                <span class="value">0 <img src="star.png" alt="star"></span>
            </div>
        </div>

        <div class="ref-link-card">
            <span class="card-title">РЕФЕРАЛЬНАЯ СИСТЕМА</span>
            <div class="ref-link-row">
                <input class="ref-link-input" id="refLinkInput" type="text" value="https://t.me/GiftPepeBot?start=ref_" readonly>
                <div class="ref-copy-icon" onclick="copyRefLink()">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="9" y="9" width="13" height="13" rx="3" stroke="rgba(255,255,255,0.8)" stroke-width="1.8"/>
                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="rgba(255,255,255,0.8)" stroke-width="1.8"/>
                    </svg>
                </div>
            </div>
            <button class="ref-copy-btn" onclick="copyRefLink()">Скопировать ссылку</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-items" id="navItems">
            <div class="nav-indicator" id="navIndicator"></div>

            <div class="nav-item active" data-index="0" onclick="switchTab(this)">
                <img src="trophy.svg" alt="Топ">
                <span>Топ</span>
            </div>

            <div class="nav-item" data-index="1" onclick="switchTab(this)">
                <img src="game.svg" alt="Игры">
                <span>Игры</span>
            </div>

            <div class="nav-item" data-index="2" onclick="switchTab(this)">
                <img src="user.svg" alt="Профиль">
                <span>Профиль</span>
            </div>
        </div>
    </nav>

    <script>
        // ─── Prevent long-press download ───
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());

        // ─── Loading Screen ───
        setTimeout(() => {
            const loader = document.getElementById('loadingScreen');
            loader.classList.add('hide');
            setTimeout(() => loader.remove(), 400);
        }, 1500);

        // ─── Telegram Web App ───
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#1a1a2e');
            tg.setBackgroundColor('#1a1a2e');

            if (tg.requestFullscreen) {
                tg.requestFullscreen();
            }

            if (tg.disableVerticalSwipes) {
                tg.disableVerticalSwipes();
            }

            // User info
            const user = tg.initDataUnsafe?.user;
            if (user) {
                const nameEl = document.getElementById('userName');
                const avatarEl = document.getElementById('userAvatar');
                nameEl.textContent = user.first_name || 'User';

                // Profile page
                document.getElementById('profileName').textContent = user.first_name || 'User';
                document.getElementById('profileUsername').textContent = user.username ? ('@' + user.username) : '';

                if (user.photo_url) {
                    avatarEl.src = user.photo_url;
                    const pAvatar = document.getElementById('profileAvatar');
                    pAvatar.src = user.photo_url;
                    pAvatar.style.display = 'block';
                } else {
                    avatarEl.style.display = 'none';
                    const placeholder = document.createElement('div');
                    placeholder.style.cssText = 'width:32px;height:32px;border-radius:50%;background:rgba(100,170,255,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;';
                    const letter = (user.first_name || 'U')[0];
                    placeholder.textContent = letter;
                    avatarEl.parentNode.insertBefore(placeholder, avatarEl);

                    const pPlaceholder = document.getElementById('profileAvatarPlaceholder');
                    pPlaceholder.textContent = letter;
                    pPlaceholder.style.display = 'flex';
                }

                // Set referral link
                if (user.id) {
                    document.getElementById('refLinkInput').value = 'https://t.me/GiftPepeBot?start=ref_' + user.id;
                }
            }
        }

        // ─── Navigation ───
        const indicator = document.getElementById('navIndicator');
        const navItems = document.getElementById('navItems');
        const pages = ['page-top', 'page-games', 'page-profile'];

        function positionIndicator(item) {
            const itemRect = item.getBoundingClientRect();
            const parentRect = navItems.getBoundingClientRect();
            const center = itemRect.left - parentRect.left + (itemRect.width / 2) - 29;
            indicator.style.left = center + 'px';
        }

        function switchTab(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            positionIndicator(el);

            // Switch pages
            const idx = parseInt(el.dataset.index);
            document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
            document.getElementById(pages[idx]).classList.add('active');
        }

        // Начальная позиция индикатора
        window.addEventListener('load', () => {
            const active = document.querySelector('.nav-item.active');
            if (active) {
                indicator.style.transition = 'none';
                positionIndicator(active);
                requestAnimationFrame(() => {
                    indicator.style.transition = 'left 0.45s cubic-bezier(0.22, 1, 0.36, 1)';
                });
            }
        });

        window.addEventListener('resize', () => {
            const active = document.querySelector('.nav-item.active');
            if (active) positionIndicator(active);
        });

        // ─── Lottie Animation ───
        if (typeof lottie !== 'undefined') {
            lottie.loadAnimation({
                container: document.getElementById('giftsLottie'),
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: 'PlushPepe%28blue%29.json'
            });
        }

        // ─── Games ───
        function openGame(name) {
            console.log('Open game:', name);
        }

        function openBanner(url) {
            if (tg && tg.openTelegramLink) {
                tg.openTelegramLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        // ─── Referral Page ───
        function showReferralPage() {
            document.getElementById('page-profile').classList.remove('active');
            document.getElementById('page-referral').classList.add('active');
        }

        function hideReferralPage() {
            document.getElementById('page-referral').classList.remove('active');
            document.getElementById('page-profile').classList.add('active');
        }

        function copyRefLink() {
            const input = document.getElementById('refLinkInput');
            const link = input.value;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link);
            } else {
                input.select();
                document.execCommand('copy');
            }
            // Feedback
            const btn = document.querySelector('.ref-copy-btn');
            const old = btn.textContent;
            btn.textContent = 'Скопировано!';
            setTimeout(() => btn.textContent = old, 1500);
        }

        function openSettings() {
            console.log('Settings');
        }
    </script>
</body>
</html>
